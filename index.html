<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>みんステ｜車好きのためのオリジナルカッティングステッカー専門店</title>
  <meta name="description" content="車好きのためのオリジナルカッティングステッカー専門店「みんステ」。トヨタ、スズキなどの車種別からアウトドア、キッズインカーまで。メルカリShopで販売中！オーダーメイドも受付。">
  <meta name="keywords" content="カッティングステッカー, 車 ステッカー, オーダーメイド, キャンプ, キッズインカー, みんステ, メルカリ">
  <link rel="canonical" href="https://your-domain.com/"> <meta property="og:type" content="website">
  <meta property="og:title" content="みんステ｜車好きのためのステッカー専門店">
  <meta property="og:description" content="愛車に個性を。高品質なカッティングステッカーをメルカリでお手軽に。">
  <meta property="og:image" content="https://your-domain.com/images/ogp-image.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "みんステ",
    "description": "オリジナルカッティングステッカー専門店",
    "image": "https://your-domain.com/images/minste-logo-circle.png",
    "url": "https://your-domain.com/",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "JP"
    },
    "offers": {
      "@type": "Offer",
      "itemOffered": "Custom Stickers"
    }
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />

  <style>
    /* ベース設定 */
    body { margin: 0; font-family: 'Noto Sans JP', sans-serif; background-color: #f5f3ef; color: #4b4b4b; line-height: 1.6; }
    
    /* ① ヘッダー最適化 */
    header {
      background-color: #3e3e3e;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 999;
      height: 60px;
    }
    .logo-container picture img {
      height: 50px; /* PCサイズ */
      width: auto;
      display: block;
    }
    /* スマホ時は縦長ロゴを想定 */
    @media (max-width: 600px) {
      .logo-container picture img { height: 60px; } 
    }

    .menu-toggle { font-size: 1.8em; background: none; border: none; color: #f5f3ef; cursor: pointer; display: none; }
    .nav-menu { display: flex; gap: 15px; }
    .nav-menu a { color: #f5f3ef; text-decoration: none; font-weight: bold; font-size: 0.95em; }

    /* HERO */
    .hero {
      position: relative;
      width: 100%;
      height: 400px;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/ad8.jpg') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-text {
      color: #f5f3ef;
      font-size: clamp(1.2rem, 5vw, 2.2rem);
      font-weight: bold;
      text-align: center;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }

    /* ② スライダー5段設定（主要5カテゴリ） */
    .sticker-section { padding: 40px 20px; max-width: 1200px; margin: auto; }
    .category-label { 
      display: inline-block; 
      background: #6b8e23; 
      color: white; 
      padding: 2px 12px; 
      border-radius: 4px; 
      font-size: 0.8em; 
      margin-bottom: 10px;
    }
    .swiper { width: 100%; margin-bottom: 40px; border-radius: 12px; }
    .swiper-slide img { width: 100%; height: auto; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; }

    /* カテゴリーグリッド */
    .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
    .category-card { border-radius: 10px; text-align: center; padding: 15px; font-weight: bold; transition: 0.3s; }
    .category-card:hover { transform: translateY(-5px); opacity: 0.9; }
    .category-card a { text-decoration: none; color: #fff; }

    /* 各種ブランドカラー（既存のものは維持し、JDMなどの文字色を調整） */
    .toyota { background-color: #eb0a1e; } .suzuki { background-color: #e10000; }
    .mitsubishi { background-color: #e60012; } .outdoor { background-color: #4caf50; }
    .kids { background-color: #ffb6c1; color: #000; }

    /* レスポンシブ */
    @media (max-width: 600px) {
      .menu-toggle { display: block; }
      .nav-menu {
        position: absolute; top: 60px; right: 20px; background-color: #3e3e3e;
        flex-direction: column; padding: 20px; border-radius: 8px; display: none;
      }
      .nav-menu.active { display: flex; }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo-container">
      <a href="/">
        <picture>
          <source media="(max-width: 600px)" srcset="images/logo-sp.png">
          <img src="images/minste-logo-circle.png" alt="みんステ｜ステッカー専門店ロゴ">
        </picture>
      </a>
    </div>
    <button class="menu-toggle" aria-label="メニューを開く">☰</button>
    <nav class="nav-menu">
      <a href="#about">当店について</a>
      <a href="#gallery">商品一覧</a>
      <a href="#order">オーダーメイド</a>
      <a href="#contact">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1 class="hero-text">あなたの愛車に、世界に一つの個性を。</h1>
    </section>

    <section class="sticker-section" id="gallery">
      <h2>注目のステッカー</h2>

      <div class="category-label">TOYOTA</div>
      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img src="images/lc70black.jpg" alt="ランドクルーザー70 ステッカー"></div>
          <div class="swiper-slide"><img src="images/lc150white.jpg" alt="プラド ステッカー"></div>
          <div class="swiper-slide"><img src="images/lclogoblack5.jpg" alt="ランクル ロゴステッカー"></div>
        </div>
      </div>

      <div class="category-label">SUZUKI</div>
      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img src="images/jimnyjb64gold.jpg" alt="ジムニー JB64 ステッカー"></div>
          <div class="swiper-slide"><img src="images/jimnyjb74silver.jpg" alt="ジムニーシエラ ステッカー"></div>
          <div class="swiper-slide"><img src="images/jb23black.jpg" alt="ジムニー JB23 ステッカー"></div>
        </div>
      </div>

      <div class="category-label">MITSUBISHI</div>
      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img src="images/newd5custamkidsincarblack.jpg" alt="デリカD5 カスタム"></div>
          <div class="swiper-slide"><img src="images/d5customwhite2.jpg" alt="デリカ ステッカー"></div>
          </div>
      </div>

      <div class="category-label">OUTDOOR / CAMP</div>
      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img src="images/jb74customrockwhite2.jpg" alt="オフロードスタイル"></div>
          </div>
      </div>

      <div class="category-label">KIDS IN CAR</div>
      <div class="swiper mySwiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide"><img src="images/jb74customkidsincarblack.jpg" alt="キッズインカー ジムニー"></div>
          </div>
      </div>
    </section>

    </main>

  <footer>
    <p>&copy; 2025 みんステ｜車好きのためのステッカー専門店</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
  <script>
    const swiperOptions = {
      loop: true,
      autoplay: { delay: 3000, disableOnInteraction: false },
      slidesPerView: 2,
      spaceBetween: 15,
      breakpoints: {
        600: { slidesPerView: 3 },
        1000: { slidesPerView: 4 }
      }
    };
    // 全てのスライダーを一括初期化
    const swipers = new Swiper(".mySwiper", swiperOptions);

    const toggleButton = document.querySelector('.menu-toggle');
    const navMenu = document.querySelector('.nav-menu');
    toggleButton.addEventListener('click', () => navMenu.classList.toggle('active'));
  </script>
</body>
</html>
